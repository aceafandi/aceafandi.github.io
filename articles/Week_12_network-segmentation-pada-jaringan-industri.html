   <header class="article-header"><div class="article-header-inner"><span class="article-tag">Network Design</span><h1>Network Segmentation pada Jaringan Industri</h1><div class="article-meta">5 min read</div><div class="lang-toggle"><a href="https://scodenoindonesia.com/articles/Week_12_network-segmentation-pada-jaringan-industri.html" class="active-lang">🇮🇩 ID</a><a href="https://en.scodenoindonesia.com/articles/Week_12_network-segmentation-pada-jaringan-industri.html">🇬🇧 EN</a></div></div></header>
   <article class="article-body">
   <p>Satu jaringan datar. Semua perangkat terhubung. Semua trafik bercampur.</p>
   <p>Kedengarannya efisien. Kenyataannya berbahaya.</p>
   <p>Di jaringan datar, laptop teknisi yang terinfeksi malware bisa menjangkau PLC yang mengendalikan turbin. Broadcast storm dari CCTV bisa melumpuhkan komunikasi safety. Traffic spike dari backup server bisa membuat HMI timeout.</p>
   <p><strong>Industrial network segmentation</strong> adalah jawabannya — strategi memisahkan jaringan menjadi zona-zona independen berdasarkan fungsi, risiko, dan prioritas.</p>
   <hr>
   <h2>Kenapa Segmentasi?</h2>
   <p><strong>Keamanan.</strong> Tanpa segmentasi, satu perangkat dikompromikan bisa menjangkau seluruh jaringan. Dengan segmentasi, malware di zona IT tidak menyentuh zona OT.</p>
   <p><strong>Performa.</strong> Trafik video, backup data, dan kontrol PLC tidak boleh berbagi antrean. Segmentasi memastikan trafik bandwidth-intensive tidak mengganggu trafik latency-sensitive.</p>
   <p><strong>Manajemen.</strong> Zona jelas = troubleshooting cepat. "Masalah di zona kontrol atau video?" lebih baik daripada "di antara 200 perangkat."</p>
   <h2>Metode Segmentasi</h2>
   <p><strong>Fisik — Air Gap.</strong> Dua jaringan terpisah total. Keamanan maksimum. Mahal. Untuk sistem safety-critical.</p>
   <p><strong>Logis — VLAN.</strong> Satu infrastruktur, beberapa jaringan virtual. Hemat hardware. Butuh switch managed. Untuk sebagian besar pabrik.</p>
   <p><strong>Firewall & ACL.</strong> Batasi komunikasi antar zona: protocol apa, port berapa. SCADA boleh polling PLC via Modbus TCP 502 — tapi tidak boleh SSH atau HTTP.</p>
   <p><strong>VPN & DMZ.</strong> Akses remote wajib lewat DMZ dulu — diperiksa, baru diteruskan ke internal.</p>
   <h2>Purdue Model</h2>
   <div class="table-wrap"><table>
   <thead><tr><th>Level</th><th>Nama</th><th>Fungsi</th></tr></thead>
   <tbody>
   <tr><td>5</td><td>Enterprise</td><td>ERP, cloud</td></tr>
   <tr><td>4</td><td>Site Business</td><td>MES, historian</td></tr>
   <tr><td>3.5</td><td>DMZ</td><td>Buffer IT-OT</td></tr>
   <tr><td>3</td><td>Operations</td><td>SCADA, HMI</td></tr>
   <tr><td>2</td><td>Supervisory</td><td>PLC, RTU</td></tr>
   <tr><td>1</td><td>Control</td><td>Sensor, actuator</td></tr>
   <tr><td>0</td><td>Process</td><td>Mesin, robot</td></tr>
   </tbody>
   </table></div>
   <h2>Segmentasi di Switch Scodeno</h2>
   <p><strong>Network isolation OT</strong> langsung di switch, tanpa tambahan hardware:</p>
   <p><strong>VLAN managed.</strong> Setiap zona dapat VLAN sendiri. Inter-VLAN routing dikontrol ketat.</p>
   <p><strong>Port Isolation DIP switch.</strong> Unmanaged — setiap port hanya bicara ke uplink. Kamera tidak saling melihat. Tidak saling menginfeksi.</p>
   <p><strong>QoS per VLAN.</strong> Setelah zona dipisah, QoS memprioritaskan kontrol di atas trafik lain.</p>
   <h2>Kesimpulan</h2>
   <p><a href="../"><strong>Industrial network segmentation</strong></a> bukan proyek opsional. Ini fondasi keamanan dan performa.</p>
   <p>Tanpa segmentasi, satu perangkat dikompromikan bisa melumpuhkan seluruh operasi. Dengan segmentasi, kerusakan terlokalisasi. Zona kontrol tetap jalan meskipun zona IT diserang ransomware.</p>
   <hr><p><strong>Sumber:</strong> Scodeno XPTN-9000 Series. ISA/IEC 62443.</p>
