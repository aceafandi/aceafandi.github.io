   <header class="article-header"><div class="article-header-inner"><span class="article-tag">Technology</span><h1>VLAN dalam Industrial Ethernet Network</h1><div class="article-meta">5 min read</div><div class="lang-toggle"><a href="https://scodenoindonesia.com/articles/Week_10_vlan-dalam-industrial-ethernet-network.html" class="active-lang">🇮🇩 ID</a><a href="https://en.scodenoindonesia.com/articles/Week_10_vlan-dalam-industrial-ethernet-network.html">🇬🇧 EN</a></div></div></header>
   <article class="article-body">
   <p>Satu switch. Dua jaringan. Tanpa kabel tambahan.</p>
   <p>Itulah kekuatan VLAN. Anda bisa menjalankan jaringan kontrol PLC dan jaringan CCTV dalam satu switch fisik yang sama — tanpa keduanya saling melihat atau saling membebani.</p>
   <p><strong>VLAN industrial network</strong> adalah teknik segmentasi yang membagi switch fisik menjadi beberapa switch virtual. Setiap VLAN beroperasi sebagai domain broadcast independen. Trafik di VLAN 10 tidak bocor ke VLAN 20.</p>
   <hr>
   <h2>Apa Itu VLAN?</h2>
   <p>Spurgeon dan Zimmerman (2013) menjelaskan: jika Anda mengonfigurasi port 1-4 sebagai VLAN 100 dan port 5-8 sebagai VLAN 200, switch 8-port tersebut berfungsi seolah-olah dibagi menjadi dua switch 4-port independen. Broadcast dari VLAN 100 tidak dikirim ke port mana pun di VLAN 200.</p>
   <p>Tanpa VLAN, switch memperlakukan semua port sebagai satu jaringan datar. Setiap broadcast dikirim ke semua port. Di jaringan dengan 50 perangkat campuran PLC, kamera, HMI, dan sensor, broadcast storm bisa melumpuhkan komunikasi kontrol.</p>
   <h2>Kenapa VLAN Kritis di Pabrik?</h2>
   <p>Pabrik modern menjalankan trafik beragam: kontrol PLC (latency-sensitive), video CCTV (bandwidth besar), SCADA/HMI (periodik), safety (kritikal), voice (sensitif jitter). Mencampur semua dalam satu broadcast domain adalah resep masalah. VLAN memisahkannya.</p>
   <h2>Port-Based vs 802.1Q</h2>
   <p><strong>Port-Based VLAN:</strong> port dikelompokkan langsung. Sederhana. Cocok untuk switch unmanaged dengan DIP switch. Tidak bisa lintas switch.</p>
   <p><strong>802.1Q Tagged VLAN:</strong> frame diberi tag VLAN ID. Bisa melintasi banyak switch via trunk port. Satu kabel uplink membawa puluhan VLAN. Butuh switch managed.</p>
   <h2>VLAN di Switch Scodeno</h2>
   <p><strong>Unmanaged DIP switch:</strong> VLAN port-based via sakelar fisik. Tanpa software. Tanpa IP. Switch unmanaged Scodeno adalah satu dari sedikit yang punya fitur ini.</p>
   <p><strong>Managed 802.1Q:</strong> web GUI, hingga 4094 VLAN, trunk port, VLAN-aware QoS, voice VLAN, management VLAN terpisah.</p>
   <h2>Contoh Implementasi</h2>
   <div class="table-wrap"><table>
   <thead><tr><th>Port</th><th>VLAN</th><th>Fungsi</th></tr></thead>
   <tbody>
   <tr><td>1-4</td><td>VLAN 10</td><td>Kontrol (PLC, drive)</td></tr>
   <tr><td>5-8</td><td>VLAN 20</td><td>Video (CCTV, NVR)</td></tr>
   <tr><td>9-12</td><td>VLAN 30</td><td>SCADA (HMI, data logger)</td></tr>
   <tr><td>13-16</td><td>Trunk</td><td>Uplink 802.1Q ke core</td></tr>
   </tbody>
   </table></div>
   <p>Hasil: kamera tidak membanjiri PLC. SCADA tidak mengganggu kontrol. Semua VLAN naik ke core lewat satu kabel trunk.</p>
   <h2>Kesimpulan</h2>
   <p><strong>VLAN industrial network</strong> adalah cara paling efisien untuk <strong>industrial network segmentation</strong> tanpa menambah hardware. <a href="../">Scodeno Indonesia</a> menyediakan switch managed dengan dukungan 802.1Q penuh.</p>
   <p>Untuk instalasi kecil: DIP switch VLAN Scodeno — isolasi cukup, tanpa kompleksitas. Untuk jaringan besar: 802.1Q managed — skalabilitas penuh.</p>
   <p>Intinya: jangan biarkan trafik video membanjiri port kontrol. VLAN adalah dinding pemisahnya.</p>
   <hr><p><strong>Sumber:</strong> Spurgeon &amp; Zimmerman (2013). Scodeno XPTN-9000 Series.</p>
